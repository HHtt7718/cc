<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生肖赋值</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #bb6868 0%, #001c4a 100%);
            padding: 15px;
            font-family: 'Times New Roman', serif;
        }

        .glass-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .data-btn {
            padding: 8px 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 6px;
            color: #333;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .data-btn:hover {
            background: rgba(180, 190, 220, 0.3);
        }

        .data-btn.active {
            background: rgba(100, 120, 180, 0.4);
            color: #fff;
            border-color: rgba(100, 120, 180, 0.5);
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border-radius: 8px;
        }

        table {
            width: 100%;
            min-width: 800px;
            font-weight: bold;
            border-spacing: 0;
            border-radius: 8px;
            overflow: hidden;
        }

        th,
        td {
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            padding: 10px 8px;
            text-align: center;
            font-size: 15px;
            color: #222;
            white-space: nowrap;
        }

        th {
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 14px;
        }

        td:last-child {
            border-right: none;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:nth-child(even) {
            background-color: rgba(0, 0, 0, 0.02);
        }

        tr:hover {
            background-color: rgba(180, 190, 220, 0.1);
        }

        @media (max-width: 768px) {
            .glass-container {
                padding: 10px;
            }

            th,
            td {
                padding: 6px 4px;
                font-size: 12px;
            }

            .data-btn {
                padding: 6px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="glass-container">
        <div class="btn-group">
            <button class="data-btn active" data-num="20">近20期</button>
            <button class="data-btn" data-num="50">近50期</button>
            <button class="data-btn" data-num="100">近100期</button>
            <button class="data-btn" data-num="all">全部数据</button>
        </div>
        <div class="table-wrapper">
            <table id="dataTable"></table>
        </div>
    </div>

    <script src="../predText/predHitDate.js"></script>
    <script src="./js.js"></script>

    <script>
        const originalData = [...processed];
        
        function getLastNData(count) {
            if (count === 'all') return [...originalData];

            return originalData.slice(-count);
        }

        function renderTable(data) {
            const table = document.getElementById('dataTable');
            table.innerHTML = '';

            const headers = ["期数", "特号", "生肖",
                "男", "女", "家", "野",
                "菜", "草", "肉", "天", "地", "人",
                "福", "禄", "寿", "日", "月", "星",
                "魏", "蜀", "吴", "琴", "棋", "书", "画",
                "春", "夏", "秋", "冬", "东", "西", "南", "北",
                "梅", "兰", "菊", "竹"];

            const headerRow = document.createElement('tr');
            headers.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header;
                headerRow.appendChild(th);

                const softColors = {
                    "男女": "linear-gradient(to top, #b3cde0, #9ab3d0)",
                    "家野": "linear-gradient(to top, #c8e6c9, #a5d6a7)",
                    "菜草肉": "linear-gradient(to top, #fff9c4, #f0e6b0)",
                    "天地人": "linear-gradient(to top, #f8c8dc, #e8b8d0)",
                    "福禄寿": "linear-gradient(to top, #ffccbc, #f5b0a0)",
                    "日月星": "linear-gradient(to top, #b0bec5, #90a4ae)",
                    "魏蜀吴": "linear-gradient(to top, #c8e6c9, #a5d6a7)",
                    "琴棋书画": "linear-gradient(to top, #fff9c4, #f0e6b0)",
                    "春夏秋冬": "linear-gradient(to top, #b2ebf2, #80deea)",
                    "东西南北": "linear-gradient(to top, #b3cde0, #9ab3d0)",
                    "梅兰菊竹": "linear-gradient(to top, #f8c8dc, #e8b8d0)"
                };

                for (let group in softColors) {
                    if (group.includes(header)) {
                        th.style.background = softColors[group];
                        break;
                    }
                }
            });
            table.appendChild(headerRow);

            data.forEach(item => {
                const row = document.createElement('tr');
                headers.forEach(header => {
                    const td = document.createElement('td');
                    
                    if (header === "特号") {
                        const color = getAttributeColor(item[header]);
                        td.innerHTML = color ? `<span style="color: ${color}">${item[header]}</span>` : item[header];
                    }
                    else if (["男", "女", "家", "野", "菜", "草", "肉", "天", "地", "人",
                        "福", "禄", "寿", "日", "月", "星", "魏", "蜀", "吴",
                        "琴", "棋", "书", "画", "春", "夏", "秋", "冬",
                        "东", "西", "南", "北", "梅", "兰", "菊", "竹"].includes(header)) {
                        
                        const value = item[header];
                        td.textContent = value;
                        
                        const softBg = {
                            "男": "#e0f7ff", "女": "#e0f7ff",
                            "家": "#e8f5e9", "野": "#e8f5e9",
                            "菜": "#fff8e1", "草": "#fff8e1", "肉": "#fff8e1",
                            "天": "#fce4ec", "地": "#fce4ec", "人": "#fce4ec",
                            "福": "#ffe0e0", "禄": "#ffe0e0", "寿": "#ffe0e0",
                            "日": "#e0e0e0", "月": "#e0e0e0", "星": "#e0e0e0",
                            "魏": "#e8f5e9", "蜀": "#e8f5e9", "吴": "#e8f5e9",
                            "琴": "#fff8e1", "棋": "#fff8e1", "书": "#fff8e1", "画": "#fff8e1",
                            "春": "#e0f7fa", "夏": "#e0f7fa", "秋": "#e0f7fa", "冬": "#e0f7fa",
                            "东": "#e0f7ff", "西": "#e0f7ff", "南": "#e0f7ff", "北": "#e0f7ff",
                            "梅": "#fce4ec", "兰": "#fce4ec", "菊": "#fce4ec", "竹": "#fce4ec"
                        };
                        if (softBg[value]) td.style.backgroundColor = softBg[value];
                    } else {
                        td.textContent = item[header];
                    }
                    row.appendChild(td);
                });
                table.appendChild(row);
            });
        }

        const buttons = document.querySelectorAll('.data-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const num = btn.dataset.num;
                const showData = num === 'all' ? getLastNData('all') : getLastNData(Number(num));
                renderTable(showData);
            });
        });

        renderTable(getLastNData(20));
    </script>
</body>

</html>
