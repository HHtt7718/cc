<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <title>平码回顾</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 低亮度深色背景（护眼） */
        body {
            font-family: "微软雅黑", Arial, sans-serif;
            background: linear-gradient(135deg, #45617c 0%, #ababff 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* 深色毛玻璃按钮 */
        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 10px 24px;
            font-size: 15px;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-2px);
        }

        /* 深色毛玻璃表格 */
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 1400px;
            margin: 30px auto;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        th,
        td {
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 15px;
            text-align: center;
            color: #e0e0e0;
        }

        /* 表头 */
        th {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            font-weight: bold;
            color: #ffffff;
        }

        tr:nth-child(even) {
            background: rgba(0, 0, 0, 0.1);
        }

        /* 特码配色（红色，适配叉号） */
        .highlight {
            background: linear-gradient(135deg, #6a5656, #685c5c) !important;
            color: #fff !important;
            font-weight: bold;
            border-radius: 10px;
        }

        /* 绿色对勾 */
        .correct {
            color: #10b981 !important;
            font-weight: bold;
            font-size: 18px;
        }

        /* 红色叉号 */
        .wrong {
            color: #f87171 !important;
            font-weight: bold;
            font-size: 18px;
        }

        h2 {
            text-align: center;
            color: #ffffff;
            margin: 20px 0;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .btn-box {
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <h2></h2>
    <div class="btn-box">
        <button id="copyBtn" class="glass-btn">复制最新一期往期号码</button>
    </div>
    <table id="dataTable">
        <thead>
            <tr>
                <th>日期</th>
                <th>期数</th>
                <th>平码</th>
                <th>特码</th>
                <th>平预测</th>
                <th>平预测命中</th>
                <th>往期号码</th>
                <th>号码数量</th>
                <th>往期命中</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="./predHitDate.js"></script>

    <script>
        //往期 期数
        const currentIndexNum = 9;

        // 解析原始数据为结构化对象
        function parseData(raw) {
            const groups = [];
            const blocks = raw.trim().split(/\n\s*\n(?=\d{4}-\d{2}-\d{2}\s*\n\d+期)/);
            for (const block of blocks) {
                const lines = block.trim().split('\n').map(l => l.trim()).filter(Boolean);
                if (lines.length < 6) continue;
                const date = lines[0];
                const period = lines[1];
                const plusIdx = lines.findIndex(l => l === "+");
                if (plusIdx < 0 || plusIdx + 2 >= lines.length) continue;
                const pm = [];
                for (let i = 2; i < plusIdx; i += 2) {
                    pm.push({ num: lines[i], sx_wx: lines[i + 1] });
                }
                const tm = { num: lines[plusIdx + 1], sx_wx: lines[plusIdx + 2] };
                groups.push({ date, period, pm, tm });
            }
            return groups;
        }

        // 获取往期号码
        function getPastNumbers(groups, currentIndex) {
            if (currentIndex === groups.length - 1) return { numbers: '', count: 0 };
            const endIndex = Math.min(groups.length - 1, currentIndex + currentIndexNum);
            if (endIndex - currentIndex + 1 < currentIndexNum - 1) return { numbers: '', count: 0 };
            const pastNumbers = [];
            for (let i = currentIndex; i <= endIndex; i++) {
                groups[i].pm.forEach(x => pastNumbers.push(x.num.padStart(2, '0')));
            }
            const uniqueSortedNumbers = [...new Set(pastNumbers)]
                .map(num => parseInt(num))
                .sort((a, b) => a - b)
                .map(num => num.toString().padStart(2, '0'));
            const chunkedNumbers = [];
            for (let i = 0; i < uniqueSortedNumbers.length; i += 10) {
                chunkedNumbers.push(uniqueSortedNumbers.slice(i, i + 10).join(','));
            }
            const formattedNumbers = chunkedNumbers.join(',' + '<br>');
            return {
                numbers: formattedNumbers,
                count: uniqueSortedNumbers.length
            };
        }

        // 判断往期号码是否命中
        function checkPastHit(pastNumbers, prevGroup) {
            if (!prevGroup || !pastNumbers) return '';
            return pastNumbers.includes(prevGroup.tm.num.padStart(2, '0')) ?
                `<span class="correct">✔</span>` : `<span class="wrong">✘</span>`;
        }

        // 计算命中率
        function calculateHitRate(groups, hitType) {
            let hits = 0;
            let total = 0;
            for (let i = 0; i < groups.length; i++) {
                if (hitType === 'pred') {
                    const pred = predictNextTM(groups[i]);
                    if (checkHit(pred, groups[i - 1]).includes('✔')) hits++;
                } else if (hitType === 'past') {
                    const pastNumbers = getPastNumbers(groups, i).numbers;
                    if (pastNumbers && checkPastHit(pastNumbers.replace(/<br>/g, ','), groups[i - 1]).includes('✔')) hits++;
                }
                total++;
            }
            return total > 0 ? (hits / total * 100).toFixed(2) + '%' : '0%';
        }

        function renderTable(groups) {
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = '';
            for (let i = 0; i < groups.length; i++) {
                const g = groups[i];
                const tr = document.createElement('tr');
                tr.innerHTML += `<td>${g.date}</td>`;
                tr.innerHTML += `<td>${g.period}</td>`;
                tr.innerHTML += `<td>${g.pm.map(x => `${x.num.padStart(2, '0')}/${x.sx_wx}`).join('， ')}</td>`;
                tr.innerHTML += `<td class="highlight">${g.tm.num.padStart(2, '0')}<br>${g.tm.sx_wx}</td>`;
                const pred = predictNextTM(g);
                tr.innerHTML += `<td>${pred}</td>`;
                const hit = checkHit(pred, groups[i - 1]);
                tr.innerHTML += `<td>${hit}</td>`;
                const pastNumbersData = getPastNumbers(groups, i);
                tr.innerHTML += `<td>${pastNumbersData.numbers}</td>`;
                tr.innerHTML += `<td>${pastNumbersData.count}</td>`;
                const pastHit = checkPastHit(pastNumbersData.numbers.replace(/<br>/g, ','), groups[i - 1]);
                tr.innerHTML += `<td>${pastHit}</td>`;
                tbody.appendChild(tr);
            }

            const predHitRate = calculateHitRate(groups, 'pred');
            const pastHitRate = calculateHitRate(groups, 'past');
            const titleElement = document.querySelector('h2');
            if (titleElement) {
                titleElement.innerHTML = `平码回顾  倒序排序<br> <span style="font-size: 0.8em; color: #e0e0e0;">(平预测命中率: ${predHitRate}%) (往 ${currentIndexNum +1}期 命中率: ${pastHitRate}%)</span>`;
            }
        }

        // 预测算法
        function predictNextTM(group) {
            const sxSet = new Set(group.pm.map(x => x.sx_wx.split('/')[0]));
            return Array.from(sxSet).join('、');
        }

        // 判断预测是否命中
        function checkHit(pred, nextGroup) {
            if (!nextGroup) return '';
            const nextTM_SX = nextGroup.tm.sx_wx.split('/')[0];
            return pred.includes(nextTM_SX) ?
                `<span class="correct">✔</span>` : `<span class="wrong">✘</span>`;
        }

        // ===================== 终极修复：复制功能（兼容所有环境，无任何报错） =====================
        function copyLatestPastNumbers() {
            try {
                // 获取最新一期数据
                const firstRow = document.querySelector('#dataTable tbody tr:first-child');
                if (!firstRow) {
                    console.log('❌ 复制失败：暂无数据');
                    alert('暂无数据可复制');
                    return;
                }

                // 获取往期号码单元格
                const tds = firstRow.querySelectorAll('td');
                if (tds.length < 7) {
                    console.log('❌ 复制失败：表格数据异常');
                    return;
                }
                const pastNumberCell = tds[6];

                // 格式化纯文本内容
                let copyContent = pastNumberCell.textContent
                    .replace(/\s+/g, ',')
                    .replace(/,+/g, ',')
                    .replace(/^,|,$/g, '');

                if (!copyContent) {
                    console.log('❌ 复制失败：号码为空');
                    alert('本期暂无往期号码');
                    return;
                }

                // 传统兼容复制法（本地/浏览器都能用，永不报错）
                const textArea = document.createElement('textarea');
                textArea.style.position = 'fixed';
                textArea.style.left = '-9999px';
                textArea.value = copyContent;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);

                // 成功提示
                // console.log('✅ 复制成功！最新一期往期号码：', copyContent);
                // alert(`复制成功！\n号码：${copyContent}`);
                alert(`复制成功`);


            } catch (error) {
                console.error('❌ 复制异常：', error);
                alert('复制失败，请重试');
            }
        }

        // 初始化
        const groups = parseData(rawData);
        renderTable(groups);
        document.getElementById('copyBtn').addEventListener('click', copyLatestPastNumbers);

    </script>
</body>

</html>
